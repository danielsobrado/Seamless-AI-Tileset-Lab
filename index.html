<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Seamless — AI Tileset Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fa;
    --surface: #ffffff;
    --surface-2: #fbfbfd;
    --border: #e6e8ec;
    --border-strong: #d2d6dd;
    --ink: #0f1115;
    --ink-2: #3a3f47;
    --ink-3: #6b727c;
    --ink-4: #9aa1ab;
    --accent: #5d5cf6;
    --accent-soft: #eeeefe;
    --accent-ink: #4a49e0;
    --green: #1faa6b;
    --green-soft: #e6f7ee;
    --amber: #b86c00;
    --amber-soft: #fff4dc;
    --amber-border: #f3d484;
    --red: #d04545;
    --red-soft: #fde8e8;
    --blue: #2b7fff;
    --blue-soft: #e8f0ff;
    --violet: #7c3aed;
    --violet-soft: #f0eafe;
    --teal: #0d9488;
    --teal-soft: #defaf6;
    --pink: #e94c8b;
    --pink-soft: #fde7ef;
    --orange: #ea7b2c;
    --orange-soft: #ffeed8;

    --r-sm: 6px;
    --r-md: 10px;
    --r-lg: 14px;
    --r-xl: 18px;

    --shadow-1: 0 1px 0 rgba(15,17,21,0.04), 0 1px 2px rgba(15,17,21,0.04);
    --shadow-2: 0 4px 14px rgba(15,17,21,0.06), 0 1px 2px rgba(15,17,21,0.05);
    --shadow-3: 0 12px 36px rgba(15,17,21,0.10), 0 2px 6px rgba(15,17,21,0.05);

    --node-w: 240px;
    --node-h: 168px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
  body {
    font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: 'Geist Mono', ui-monospace, Menlo, monospace; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: #d6d9df; border-radius: 6px; border: 2px solid var(--surface); }
  ::-webkit-scrollbar-thumb:hover { background: #b9bdc5; }
  ::-webkit-scrollbar-track { background: transparent; }

  #root { height: 100vh; width: 100vw; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/tile-art.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/graph.jsx"></script>
<script type="text/babel" src="src/inspector.jsx"></script>
<script type="text/babel" src="src/dashboard.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
